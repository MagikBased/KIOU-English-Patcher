name: Build Desktop Patcher

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to publish as a GitHub Release, for example v0.1.0. Leave blank to only build artifacts."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: KiouEnglishPatcher-Windows
            build_args: --clean --onefile
            artifact_path: dist/KiouEnglishPatcher.exe
          - name: macOS
            os: macos-latest
            artifact: KiouEnglishPatcher-macOS
            build_args: --clean --onedir
            artifact_path: dist/KiouEnglishPatcher-macOS.zip
          - name: Linux
            os: ubuntu-22.04
            artifact: KiouEnglishPatcher-Linux
            build_args: --clean --onedir
            artifact_path: dist/KiouEnglishPatcher-Linux-x86_64.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-packaging.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-packaging.txt

      - name: Build desktop app
        run: python scripts/build_desktop_app.py ${{ matrix.build_args }}

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent KiouEnglishPatcher.app KiouEnglishPatcher-macOS.zip

      - name: Package Linux app bundle
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf KiouEnglishPatcher-Linux-x86_64.tar.gz KiouEnglishPatcher

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.release_tag }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes "Desktop patcher release $tag."
          else
            gh release create "$tag" --title "$tag" --notes "Desktop patcher release $tag."
          fi
          gh release upload "$tag" release-assets/* --clobber
