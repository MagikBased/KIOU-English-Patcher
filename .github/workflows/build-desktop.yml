name: Build Desktop Patcher

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: KiouEnglishPatcher-Windows
            build_args: --clean --onefile
            artifact_path: dist/KiouEnglishPatcher.exe
          - name: macOS
            os: macos-latest
            artifact: KiouEnglishPatcher-macOS
            build_args: --clean --onedir
            artifact_path: dist/KiouEnglishPatcher-macOS.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-packaging.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-packaging.txt

      - name: Build desktop app
        run: python scripts/build_desktop_app.py ${{ matrix.build_args }}

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent KiouEnglishPatcher.app KiouEnglishPatcher-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
